<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gastón y Viviana: La Aventura de nuestras vidas</title>
  <meta name="description" content="Una aventura épica te espera. ¿Aceptas la quest?">
  <meta property="og:title" content="Gastón y Viviana: La Aventura de nuestras vidas">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
  <div id="device-container">
    <!-- Game Screen (top/left) -->
    <div id="game-container">
      <div id="scene-container"></div>
      <div id="ui-layer">
        <div id="party-hud"></div>
      </div>
      <div id="transition-overlay"></div>
      <div id="particles-container"></div>
    </div>

    <!-- Controls Area (bottom/right) -->
    <div id="controls-area">
      <div id="dialogue-box" class="hidden">
        <div id="dialogue-portrait"></div>
        <div id="dialogue-content">
          <div id="dialogue-name"></div>
          <div id="dialogue-text"></div>
        </div>
        <div id="dialogue-indicator">▼</div>
      </div>
      <button id="btn-a" class="game-btn" aria-label="Avanzar">A</button>
    </div>
  </div>

  <script type="module" src="js/main.js?v=53"></script>
